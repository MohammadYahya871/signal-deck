name: Release Installer

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          winget install --id JRSoftware.InnoSetup --exact --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\installer\build-installer.ps1

      - name: Resolve versioned installer path
        id: installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $path = Join-Path $PWD "dist\installer\SignalDeckSetup-$version.exe"
          if (-not (Test-Path $path)) {
            throw "Installer not found at $path"
          }
          "path=$path" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" "${{ steps.installer.outputs.path }}" `
            --title "SignalDeck v${{ steps.installer.outputs.version }}" `
            --generate-notes
